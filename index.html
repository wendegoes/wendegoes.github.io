<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wendegoes</title> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & basics */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #e6f0fa);
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
    }

    /* Header */
    header {
      background: linear-gradient(90deg, #007acc, #00aaff);
      color: white;
      text-align: center;
      padding: 3rem 1rem 2rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    header h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    header p {
      font-size: 1rem;
      opacity: 0.9;
    }

    /* Main Grid */
    main {
      flex: 1;
      padding: 2rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.8rem;
    }

    /* Cards */
    .page-card {
      background: white;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      cursor: pointer;
    }
    .page-card:hover {
      transform: translateY(-7px) scale(1.03);
      box-shadow: 0 12px 25px rgba(0,0,0,0.12);
      background: #f0f8ff;
    }
    .page-card h3 {
      font-size: 1.3rem;
      margin-bottom: 0.7rem;
      color: #007acc;
    }
    .page-card a {
      display: inline-block;
      font-size: 1rem;
      color: #005f99;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .page-card a:hover {
      border-color: #007acc;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1rem 0;
      background-color: #007acc;
      color: white;
      font-size: 0.9rem;
      margin-top: auto;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }

    /* Responsive */
    @media (max-width: 500px) {
      header h1 { font-size: 1.7rem; }
      header p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to P3ngwen's GitHub Pages</h1>
  <p>Click a card below to explore a page!</p>
</header>

<main id="page-list">
  <!-- Cards will be generated here -->
</main>

<footer>
  &copy; 2026 wendegoes 
</footer>

<script>
  // List of pages
  const pages = [
    { title: "Page 1", link: "page1.html" },
    { title: "Page 2", link: "page2.html" },
    { title: "Page 3", link: "page3.html" },
    { title: "About Me", link: "about.html" },
    { title: "Projects", link: "projects.html" }
  ];

  const container = document.getElementById('page-list');

  pages.forEach(page => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.innerHTML = `
      <h3>${page.title}</h3>
      <a href="${page.link}">Go to ${page.title}</a>
    `;
    container.appendChild(card);
  });
</script>

</body>
</html>
