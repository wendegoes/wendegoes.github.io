<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3ngwen's GitHub Pages</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #007acc;
      color: white;
      text-align: center;
      padding: 2rem 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 2rem;
    }

    main {
      flex: 1;
      padding: 2rem 1rem;
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .page-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .page-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .page-card a {
      display: block;
      font-size: 1.2rem;
      color: #007acc;
      text-decoration: none;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .page-card a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background-color: #333;
      color: white;
      font-size: 0.9rem;
    }

    @media (max-width: 500px) {
      header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to P3ngwen's GitHub Pages</h1>
  <p>Click a card below to visit a page!</p>
</header>

<main>
  <!-- Example cards -->
  <div class="page-card">
    <h3>Page 1</h3>
    <a href="page1.html">Go to Page 1</a>
  </div>

  <div class="page-card">
    <h3>Page 2</h3>
    <a href="page2.html">Go to Page 2</a>
  </div>

  <div class="page-card">
    <h3>Page 3</h3>
    <a href="page3.html">Go to Page 3</a>
  </div>

  <!-- Add more cards as needed -->
</main>

<footer>
  &copy; 2026 P3ngwen
</footer>

</body>
</html>
