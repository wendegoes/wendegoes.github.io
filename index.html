<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wendegoes</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Pro Display', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f2f2f7; /* iOS light background */
      color: #1c1c1e;
    }

    /* Header */
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      background-color: #ffffff;
      box-shadow: 0 1px 10px rgba(0,0,0,0.05);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    header h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
      font-weight: 700;
      color: #1c1c1e;
    }
    header p {
      font-size: 1rem;
      font-weight: 400;
      color: #6e6e73;
    }

    /* Main Grid */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Cards */
    .page-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }
    .page-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .page-card h3 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      font-weight: 600;
      color: #1c1c1e;
    }
    .page-card a {
      display: inline-block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0a84ff; /* iOS system blue */
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      background-color: #f2f2f7;
      transition: background 0.25s, color 0.25s;
    }
    .page-card a:hover {
      background-color: #e5e5ea;
      color: #0066cc;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      background-color: #ffffff;
      color: #6e6e73;
      font-size: 0.9rem;
      box-shadow: 0 -1px 10px rgba(0,0,0,0.05);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      margin-top: auto;
    }

    /* Responsive */
    @media (max-width: 500px) {
      header h1 { font-size: 1.6rem; }
      header p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to wendegoes's GitHub Pages</h1>
  <p>Tap a card below to explore a page</p>
</header>

<main id="page-list">
  <!-- Cards will be generated here -->
</main>

<footer>
  &copy; 2026 wendegoes
</footer>

<script>
  const pages = [
    { title: "Page 1", link: "page1.html" },
    { title: "Page 2", link: "page2.html" },
    { title: "Page 3", link: "page3.html" },
    { title: "About Me", link: "about.html" },
    { title: "Projects", link: "projects.html" }
  ];

  const container = document.getElementById('page-list');

  pages.forEach(page => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.innerHTML = `
      <h3>${page.title}</h3>
      <a href="${page.link}">Go to ${page.title}</a>
    `;
    container.appendChild(card);
  });
</script>

</body>
</html>
