<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wendegoes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    /* Header */
    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
    header h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
      color: #00fff7;
      text-shadow: 0 0 10px rgba(0,255,247,0.7);
    }
    header p {
      font-size: 1rem;
      opacity: 0.8;
      color: #a0e9f9;
    }

    /* Main */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Glass Cards */
    .page-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .page-card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 15px 30px rgba(0,255,247,0.5);
    }
    .page-card h3 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      color: #00fff7;
      text-shadow: 0 0 5px rgba(0,255,247,0.5);
    }
    .page-card a {
      display: inline-block;
      font-size: 1rem;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: rgba(0,255,247,0.2);
      transition: background 0.3s, transform 0.2s;
    }
    .page-card a:hover {
      background: rgba(0,255,247,0.5);
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      font-size: 0.9rem;
      color: #a0e9f9;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
    }

    /* Responsive */
    @media (max-width: 500px) {
      header h1 { font-size: 1.8rem; }
      header p { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to wendegoes's GitHub Pages</h1>
  <p>Click a card below to explore a page!</p>
</header>

<main id="page-list">
  <!-- Cards will be generated here -->
</main>

<footer>
  &copy; 2026 wendegoes
</footer>

<script>
  const pages = [
    { title: "Page 1", link: "page1.html" },
    { title: "Page 2", link: "page2.html" },
    { title: "Page 3", link: "page3.html" },
    { title: "About Me", link: "about.html" },
    { title: "Projects", link: "projects.html" }
  ];

  const container = document.getElementById('page-list');

  pages.forEach(page => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.innerHTML = `
      <h3>${page.title}</h3>
      <a href="${page.link}">Go to ${page.title}</a>
    `;
    container.appendChild(card);
  });
</script>

</body>
</html>
