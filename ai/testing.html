<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <style>
    :root {
      --bg: radial-gradient(1200px 600px at 20% -10%, #1e293b 0%, #020617 60%);
      --panel: rgba(2, 6, 23, 0.9);
      --border: rgba(148, 163, 184, 0.15);
      --user: linear-gradient(135deg, #3b82f6, #2563eb);
      --ai: rgba(30, 41, 59, 0.95);
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    body.light {
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: rgba(2, 6, 23, 0.1);
      --ai: #f1f5f9;
      --text: #020617;
      --muted: #475569;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }

    /* FULL SCREEN CHAT */
    .chat {
      height: 100vh;
      width: 100vw;
      max-width: none;
      background: var(--panel);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      border-radius: 0;
    }

    /* Desktop centering + width cap */
    @media (min-width: 900px) {
      .chat {
        max-width: 960px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }

    .header {
      padding: 14px 18px;
      text-align: center;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }

    .header-actions {
      position: absolute;
      right: 14px;
      top: 12px;
      display: flex;
      gap: 14px;
      font-size: 16px;
    }

    .header-actions span {
      cursor: pointer;
      opacity: .75;
      transition: transform .2s, opacity .2s;
    }

    .header-actions span:hover {
      opacity: 1;
      transform: scale(1.15);
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 15px;
      animation: pop .2s ease-out;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai {
      align-self: flex-start;
      background: var(--ai);
      border-bottom-left-radius: 6px;
    }

    .typing {
      font-size: 13px;
      color: var(--muted);
      margin-left: 6px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      50% { opacity: .4; }
    }

    /* INPUT */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--border);
      background: linear-gradient(to top, rgba(0,0,0,.08), transparent);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      overflow-y: auto;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    button {
      padding: 0 20px;
      border-radius: 16px;
      border: none;
      background: var(--user);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(.96); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="chat">
  <div class="header">
    AI Chat
    <div class="header-actions">
      <span onclick="toggleTheme()">🌗</span>
      <span onclick="clearChat()">🗑️</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Type a message…"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://openaiapikey1.noah-ruwersma.workers.dev";
  const messages = document.getElementById("messages");
  const input = document.getElementById("input");

  document.body.className = localStorage.theme || "";
  messages.innerHTML = localStorage.chat || "";

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.theme = document.body.classList.contains("light") ? "light" : "";
  }

  function saveChat() {
    localStorage.chat = messages.innerHTML;
  }

  function clearChat() {
    if (!confirm("Clear chat history?")) return;
    messages.innerHTML = "";
    localStorage.removeItem("chat");
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    messages.innerHTML += `<div class="bubble user">${text}</div>`;
    input.value = "";
    input.style.height = "44px";
    saveChat();
    messages.scrollTop = messages.scrollHeight;

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "AI is typing…";
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      typing.remove();

      const bubble = document.createElement("div");
      bubble.className = "bubble ai";
      messages.appendChild(bubble);

      let i = 0;
      const reply = data.reply;
      const interval = setInterval(() => {
        bubble.textContent += reply[i++];
        messages.scrollTop = messages.scrollHeight;
        if (i >= reply.length) {
          clearInterval(interval);
          saveChat();
        }
      }, 15);

    } catch {
      typing.textContent = "⚠️ Error contacting AI";
    }
  }
</script>

</body>
</html>
