<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #020617;
      --panel: #020617;
      --border: #1e293b;
      --user: #2563eb;
      --ai: #1e293b;
      --text: #e5e7eb;
    }

    body.light {
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: #cbd5e1;
      --user: #2563eb;
      --ai: #e5e7eb;
      --text: #020617;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      transition: background .2s;
    }

    .chat {
      width: 100%;
      max-width: 440px;
      height: 92vh;
      background: var(--panel);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0,0,0,.4);
      overflow: hidden;
    }

    .header {
      padding: 14px;
      text-align: center;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 14px;
      top: 12px;
      cursor: pointer;
      font-size: 14px;
      opacity: .8;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai {
      align-self: flex-start;
      background: var(--ai);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .typing {
      font-size: 13px;
      opacity: .6;
      margin-left: 4px;
    }

    .input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      background: transparent;
      color: var(--text);
    }

    button {
      padding: 0 18px;
      border-radius: 14px;
      border: none;
      background: var(--user);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="chat">
  <div class="header">
    AI Chat
    <span class="toggle" onclick="toggleTheme()">🌗</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://openaiapikey1.noah-ruwersma.workers.dev";
  const messages = document.getElementById("messages");
  const input = document.getElementById("input");

  // Load saved theme & chat
  document.body.className = localStorage.theme || "";
  messages.innerHTML = localStorage.chat || "";

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.theme = document.body.classList.contains("light") ? "light" : "";
  }

  function saveChat() {
    localStorage.chat = messages.innerHTML;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    messages.innerHTML += `<div class="bubble user">${text}</div>`;
    input.value = "";
    saveChat();
    messages.scrollTop = messages.scrollHeight;

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "AI is typing…";
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      typing.remove();

      const bubble = document.createElement("div");
      bubble.className = "bubble ai";
      messages.appendChild(bubble);

      // Streaming effect
      let i = 0;
      const textReply = data.reply;
      const interval = setInterval(() => {
        bubble.textContent += textReply[i];
        i++;
        messages.scrollTop = messages.scrollHeight;
        if (i >= textReply.length) {
          clearInterval(interval);
          saveChat();
        }
      }, 15);

    } catch {
      typing.textContent = "⚠️ Error contacting AI";
    }
  }
</script>

</body>
</html>
