<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e5e7eb;
    }

    .chat {
      width: 100%;
      max-width: 440px;
      height: 92vh;
      background: #020617;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      border: 1px solid #1e293b;
      box-shadow: 0 25px 60px rgba(0,0,0,.65);
      overflow: hidden;
    }

    .header {
      padding: 16px;
      text-align: center;
      font-weight: 600;
      letter-spacing: .3px;
      border-bottom: 1px solid #1e293b;
      background: linear-gradient(180deg, #020617, #020617cc);
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
      animation: fadeIn .15s ease;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
      color: #e5e7eb;
      border-bottom-left-radius: 6px;
    }

    .input-area {
      padding: 12px;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
      background: #020617;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #1e293b;
      outline: none;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      line-height: 1.4;
      max-height: 120px;
    }

    button {
      padding: 0 18px;
      border-radius: 14px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="chat">
  <div class="header">AI Chat</div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message…"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://openaiapikey1.noah-ruwersma.workers.dev";
  const input = document.getElementById("input");

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  async function send() {
    const messages = document.getElementById("messages");
    const text = input.value.trim();

    if (!text) return;

    messages.innerHTML += `<div class="bubble user">${text}</div>`;
    input.value = "";
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      messages.innerHTML += `<div class="bubble ai">${data.reply}</div>`;
      messages.scrollTop = messages.scrollHeight;

    } catch {
      messages.innerHTML += `<div class="bubble ai">⚠️ Error contacting AI</div>`;
    }
  }
</script>

</body>
</html>
