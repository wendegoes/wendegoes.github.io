<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeadSec AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #020617;
  --panel: #020617;
  --border: #00ff9c33;
  --text: #00ff9c;
  --user: #00ff9c;
  --ai: #022c22;
  --glow: 0 0 10px #00ff9c55;
}

body.clean {
  --bg: #f8fafc;
  --panel: #ffffff;
  --border: #cbd5e1;
  --text: #020617;
  --user: #2563eb;
  --ai: #e5e7eb;
  --glow: none;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Courier New", monospace;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat {
  width: 100%;
  max-width: 460px;
  height: 92vh;
  background: var(--panel);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: var(--glow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 14px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.header span {
  color: #00ff9c;
}

.actions {
  position: absolute;
  right: 12px;
  top: 10px;
  display: flex;
  gap: 12px;
  cursor: pointer;
}

.messages {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bubble {
  max-width: 85%;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 14px;
  white-space: pre-wrap;
  animation: fadeIn .2s ease;
}

.user {
  align-self: flex-end;
  background: transparent;
  border: 1px solid var(--user);
  color: var(--user);
}

.ai {
  align-self: flex-start;
  background: var(--ai);
  border: 1px solid var(--border);
}

.typing {
  font-size: 12px;
  opacity: .7;
}

.input {
  border-top: 1px solid var(--border);
  padding: 10px;
  display: flex;
  gap: 8px;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  outline: none;
  border-radius: 10px;
  font-family: inherit;
}

button {
  padding: 0 18px;
  background: transparent;
  border: 1px solid var(--user);
  color: var(--user);
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  box-shadow: var(--glow);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">
    <span>☠ DEADSEC AI ☠</span>
    <div class="actions">
      <div onclick="toggleTheme()">🌓</div>
      <div onclick="clearChat()">🗑</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <textarea id="input" rows="1" placeholder="> enter command..."></textarea>
    <button onclick="send()">SEND</button>
  </div>
</div>

<script>
const WORKER_URL = "https://openaiapikey1.noah-ruwersma.workers.dev";
const messages = document.getElementById("messages");
const input = document.getElementById("input");

// restore state
document.body.className = localStorage.theme || "";
messages.innerHTML = localStorage.chat || "";

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function toggleTheme() {
  document.body.classList.toggle("clean");
  localStorage.theme = document.body.classList.contains("clean") ? "clean" : "";
}

function saveChat() {
  localStorage.chat = messages.innerHTML;
}

function clearChat() {
  if (!confirm("Purge local chat logs?")) return;
  messages.innerHTML = "";
  localStorage.removeItem("chat");
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  messages.innerHTML += `<div class="bubble user">${text}</div>`;
  input.value = "";
  saveChat();
  messages.scrollTop = messages.scrollHeight;

  const typing = document.createElement("div");
  typing.className = "typing";
  typing.textContent = "AI infiltrating system...";
  messages.appendChild(typing);

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    typing.remove();

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    messages.appendChild(bubble);

    let i = 0;
    const reply = data.reply;
    const stream = setInterval(() => {
      bubble.textContent += reply[i];
      i++;
      messages.scrollTop = messages.scrollHeight;
      if (i >= reply.length) {
        clearInterval(stream);
        saveChat();
      }
    }, 12);

  } catch {
    typing.textContent = "⚠ connection terminated";
  }
}
</script>

</body>
</html>
